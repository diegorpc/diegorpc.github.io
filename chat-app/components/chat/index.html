<div class="chat-view">
    <header class="chat-header">
        <button @click="back()" class="back-btn" aria-label="Back">
            <ChevronLeft :size="22" />
        </button>
        <template v-if="isChatLoaded">
            <div class="chat-avatar small">{{ getInitials(chatTitle) }}</div>
            <h2>{{ chatTitle }}</h2>
            <button @click="showPagesList = true" :class="['members-btn', { 'has-notification': hasPageNotifications }]" aria-label="Pages">
                <Files :size="22" />
            </button>
            <button @click="showMembersList = true" class="members-btn" aria-label="Members">
                <Users :size="22" />
            </button>
        </template>
        <div v-else class="chat-header-loading">
            <div class="loading-spinner small"></div>
        </div>
    </header>

    <members-list
        v-if="showMembersList"
        :chat-id="chatId"
        :chat-owner="chatOwner"
        :chat-title="chatTitle"
        @close="showMembersList = false"
    ></members-list>

    <pages-list
        v-if="showPagesList"
        :chat-id="chatId"
        :chat-title="chatTitle"
        @close="showPagesList = false"
    ></pages-list>

    <div class="messages-container">
        <div v-if="areMessagesLoading" class="loading-spinner-container">
            <div class="loading-spinner"></div>
        </div>
        <div v-else-if="enrichedMessages.length === 0" class="empty-messages">
            <p>No messages yet. Start the conversation!</p>
        </div>
        <div v-else class="messages-list">
            <chat-message
                v-for="item in enrichedMessages"
                :key="item.message.url"
                :message="item.message"
                :is-block-start="item.isBlockStart"
                :display-name="item.displayName"
            ></chat-message>
        </div>
    </div>

    <footer class="message-input-footer">
        <form @submit.prevent="sendMessage()" class="message-form">
            <input
                type="text"
                v-model="myMessage"
                placeholder="Message..."
                class="message-input"
            />
            <button type="submit" :disabled="!myMessage || isSendingMessage" class="send-btn" aria-label="Send">
                <Send :size="18" />
            </button>
        </form>
    </footer>
</div>
