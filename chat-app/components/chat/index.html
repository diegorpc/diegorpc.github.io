<div class="chat-view">
    <header class="chat-header">
        <button @click="back()" class="back-btn" aria-label="Back">
            <ArrowLeft :size="22" />
        </button>
        <div class="chat-avatar small">{{ getInitials(chatTitle) }}</div>
        <h2>{{ chatTitle || 'Chat' }}</h2>
    </header>

    <div class="messages-container">
        <p v-if="areMessagesLoading" class="loading-text">Loading messages...</p>
        <div v-else-if="sortedMessages.length === 0" class="empty-messages">
            <p>No messages yet. Start the conversation!</p>
        </div>
        <div v-else class="messages-list">
            <chat-message
                v-for="message in sortedMessages"
                :key="message.url"
                :message="message"
            ></chat-message>
        </div>
    </div>

    <footer class="message-input-footer">
        <form @submit.prevent="sendMessage()" class="message-form">
            <input
                type="text"
                v-model="myMessage"
                placeholder="Message..."
                class="message-input"
            />
            <button type="submit" :disabled="!myMessage || isSendingMessage" class="send-btn" aria-label="Send">
                <Send :size="18" />
            </button>
        </form>
    </footer>
</div>
