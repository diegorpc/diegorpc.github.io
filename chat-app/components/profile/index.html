<div class="profile-view">
    <header class="app-header">
        <h1>Profile</h1>
    </header>

    <div class="profile-container">
        <div v-if="isLoadingProfile" class="loading-spinner-container">
            <div class="loading-spinner"></div>
        </div>
        <template v-else>
            <div class="profile-photo-section">
                <div class="profile-photo-wrapper">
                    <div class="profile-photo-circle">
                        <img v-if="localPreviewUrl && !shouldRemovePhoto" class="profile-photo-img" :src="localPreviewUrl" />
                        <avatar v-else-if="!shouldRemovePhoto" :photo-url="iconUrl" :initial="(displayName || '?').substring(0, 1).toUpperCase()"></avatar>
                        <avatar v-else :initial="(displayName || '?').substring(0, 1).toUpperCase()"></avatar>
                        <div v-if="isUploadingPhoto" class="profile-photo-uploading">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                    <button 
                        v-if="(iconUrl || localPreviewUrl) && !shouldRemovePhoto" 
                        type="button"
                        @click="removePhoto" 
                        class="profile-photo-remove-btn"
                        :disabled="isUploadingPhoto"
                        title="Remove photo"
                    >
                        <X :size="16" />
                    </button>
                </div>
                <label class="profile-photo-btn" for="profile-photo-input" :class="{ 'disabled': isUploadingPhoto }">
                    {{ isUploadingPhoto ? 'Uploading...' : (iconUrl || localPreviewUrl ? 'Change photo' : 'Add photo') }}
                </label>
                <input
                    id="profile-photo-input"
                    type="file"
                    accept="image/*"
                    class="profile-photo-input-hidden"
                    @change="handleFileSelect"
                    :disabled="isUploadingPhoto"
                />
            </div>

            <div class="profile-field">
                <label class="profile-label">Graffiti Actor</label>
                <div class="profile-actor">{{ $graffitiSession.value?.actor }}</div>
                <div class="profile-handle">
                    <graffiti-actor-to-handle :actor="$graffitiSession.value?.actor"></graffiti-actor-to-handle>
                </div>
            </div>

            <form @submit.prevent="saveProfile()" class="profile-form">
                <div class="profile-field">
                    <label class="profile-label" for="display-name">
                        Display Name
                        <span class="char-count">{{ displayName.length }}/20</span>
                    </label>
                    <input
                        id="display-name"
                        type="text"
                        v-model="displayName"
                        placeholder="Your display name"
                        class="chat-title-input"
                        maxlength="20"
                    />
                </div>

                <div class="profile-field">
                    <label class="profile-label" for="bio">
                        Bio
                        <span class="char-count">{{ bio.length }}/100</span>
                    </label>
                    <textarea
                        id="bio"
                        v-model="bio"
                        placeholder="Tell others about yourself..."
                        class="chat-title-input"
                        rows="4"
                        maxlength="100"
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" :disabled="isSavingProfile || !hasChanges" class="create-btn">
                        {{ isSavingProfile ? 'Saving...' : 'Save Profile' }}
                    </button>
                </div>
            </form>

            <div class="profile-actions">
                <button @click="logout()" class="logout-btn">
                    <LogOut :size="18" />
                    <span>Log Out</span>
                </button>
            </div>
        </template>
    </div>
</div>
