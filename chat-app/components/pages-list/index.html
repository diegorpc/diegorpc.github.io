<div class="pages-overlay" :class="{ 'is-closing': closing }" @click.self="close()">
    <div class="pages-panel" :class="{ 'is-closing': closing }">
        <div v-if="isPagesListLoading" class="loading-spinner-container">
            <div class="loading-spinner"></div>
        </div>
        <template v-else>
            <header class="pages-header">
                <button @click="close()" class="back-btn" aria-label="Close">
                    <ChevronUp :size="22" />
                </button>
                <h2>{{ chatTitle }}'s Pages</h2>
            </header>

        <div v-if="!showCreateForm" class="pages-search-row">
            <div class="pages-search">
                <input
                    type="text"
                    v-model="searchQuery"
                    placeholder="Search pages..."
                    class="pages-search-input"
                />
            </div>
            <button class="new-chat-btn" @click="openCreateForm()" aria-label="New page">
                <Plus :size="22" />
            </button>
        </div>

        <form v-else @submit.prevent="createPage()" class="new-page-form">
            <label class="invite-label">Page name</label>
            <input
                type="text"
                v-model="newPageTitle"
                placeholder="e.g. Game Night"
                class="chat-title-input"
            />

            <label class="invite-label">Members</label>
            <div class="page-members-select">
                <button
                    v-for="member in parentChatMembers"
                    :key="member.actor"
                    type="button"
                    :class="['page-member-option', { selected: selectedMembers.has(member.actor) }]"
                    @click="toggleMember(member.actor)"
                    :disabled="member.actor === $graffiti.session?.actor"
                    :title="member.actor === $graffiti.session?.actor ? 'You are the page creator' : ''"
                >
                    <div class="page-member-avatar">
                        <avatar :photo-url="member.photoUrl" :initial="member.initial"></avatar>
                    </div>
                    <div class="page-member-name">
                        {{ member.displayName || member.actor.split('.')[0] }}
                        <Crown v-if="member.actor === $graffiti.session?.actor" :size="12" class="owner-crown" />
                    </div>
                </button>
            </div>

            <div class="form-actions">
                <button
                    type="submit"
                    :disabled="!newPageTitle.trim() || selectedMembers.size === 0 || isCreatingPage"
                    class="create-btn"
                >
                    {{ isCreatingPage ? 'Creating...' : 'Create' }}
                </button>
                <button type="button" @click="cancelCreate()" class="cancel-btn">Cancel</button>
            </div>
        </form>

        <div v-if="!showCreateForm" class="pages-container">
            <div v-if="filteredPages.length === 0" class="empty-state">
                <p v-if="searchQuery">No pages match your search.</p>
                <p v-else>No pages yet. Create one to subdivide your chat.</p>
            </div>
            <ul v-else class="pages-list">
                <li
                    v-for="page in filteredPages"
                    :key="page.url"
                    @click="openPage(page)"
                    class="page-item"
                >
                    <div class="page-icon-container">
                        <avatar :icon-url="page.value.icon" :title="page.value.title"></avatar>
                    </div>
                    <div class="page-members-grid">
                        <template v-for="(m, i) in getPageMembers(page).slice(0, 6)" :key="m.actor">
                            <div
                                v-if="i < 5 || getPageMembers(page).length <= 6"
                                class="page-member-chip"
                            >
                                <avatar :photo-url="m.photoUrl" :initial="m.initial"></avatar>
                            </div>
                        </template>
                        <div
                            v-if="getPageMembers(page).length > 6"
                            class="page-member-chip page-member-more"
                        >+{{ getPageMembers(page).length - 5 }}</div>
                    </div>
                    <div class="page-info">
                        <div class="page-name">{{ page.value.title }}</div>
                        <div class="page-preview">
                            <template v-if="getLatestMessageInfo(page)">
                                <strong>{{ getLatestMessageInfo(page).senderName }}:</strong>
                                {{ getLatestMessageInfo(page).message.value.content }}
                            </template>
                            <template v-else>Tap to open</template>
                        </div>
                    </div>
                    <div class="page-meta">
                        <div class="chat-meta-top">
                            <NotificationBadge :count="getUnreadCount(page)" />
                            <div class="page-time">
                                {{ getLatestMessageInfo(page)
                                    ? formatTimeSince(getLatestMessageInfo(page).message.value.published)
                                    : formatTimeSince(page.value.published) }}
                            </div>
                        </div>
                        <span v-if="getBookmarkCount(page) > 0" class="chat-count-meta">
                            <Bookmark :size="10" />{{ getBookmarkCount(page) }}
                        </span>
                    </div>
                </li>
            </ul>
        </div>
        </template>
    </div>
</div>
