<div class="chat-view">
    <header class="chat-header">
        <button @click="back()" class="back-btn" aria-label="Back">
            <ChevronLeft :size="22" />
        </button>
        <template v-if="isPageLoaded">
            <div class="chat-avatar small">{{ getInitials(pageTitle) }}</div>
            <div class="page-header-title">
                <div class="page-parent-name">{{ parentChatTitle || '...' }}'s</div>
                <h2>{{ pageTitle }}</h2>
            </div>
            <button @click="showMembersList = true" class="members-btn" aria-label="Members">
                <Users :size="22" />
            </button>
        </template>
        <div v-else class="chat-header-loading">
            <div class="loading-spinner small"></div>
        </div>
    </header>

    <members-list
        v-if="showMembersList"
        :chat-id="pageId"
        :chat-owner="pageOwner"
        :chat-title="pageTitle"
        :parent-chat-id="chatId"
        @close="showMembersList = false"
    ></members-list>

    <div class="messages-container">
        <div v-if="areMessagesLoading" class="loading-spinner-container">
            <div class="loading-spinner"></div>
        </div>
        <div v-else-if="enrichedMessages.length === 0" class="empty-messages">
            <p>No messages yet. Start the conversation!</p>
        </div>
        <div v-else class="messages-list">
            <chat-message
                v-for="item in enrichedMessages"
                :key="item.message.url"
                :message="item.message"
                :is-block-start="item.isBlockStart"
                :display-name="item.displayName"
                :read-state-objects="readStateObjects"
                :actor-display-names="actorDisplayNames"
                :message-actors="uniqueActors"
                @reply="handleReply"
            ></chat-message>
        </div>
    </div>

    <footer class="message-input-footer">
        <div v-if="replyingTo" class="reply-preview-bar">
            <Reply :size="14" />
            <div class="reply-preview-content">
                <span class="reply-preview-author">{{ replyingTo.displayName || 'Replying' }}</span>
                <span class="reply-preview-text">{{ replyingTo.content }}</span>
            </div>
            <button class="reply-cancel-btn" @click="replyingTo = null" aria-label="Cancel reply">
                <X :size="15" />
            </button>
        </div>
        <form @submit.prevent="sendMessage()" class="message-form">
            <input
                type="text"
                v-model="myMessage"
                placeholder="Message..."
                class="message-input"
            />
            <button type="submit" :disabled="!myMessage || isSendingMessage" class="send-btn" aria-label="Send">
                <Send :size="18" />
            </button>
        </form>
    </footer>
</div>
