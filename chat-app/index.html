<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Chat App</title>
        <script type="importmap">
            {
                "imports": { 
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js",
                    "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
                    "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
                    "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs",
                    "lucide-vue-next": "https://esm.sh/lucide-vue-next@0.454.0?deps=vue@3.5.32"
                }
            }
        </script>
        <script src="index.js" type="module"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">Loading...</div>
        <template id="app-template">
            <div class="app-container" :class="{ 'reduce-motion': reduceMotion, 'is-desktop': isDesktop }">
                <button v-if="!$graffitiSession.value" @click="$graffiti.login()" class="login-btn">
                    Log In
                </button>
                <template v-else>
                    <aside v-if="isDesktop" class="desktop-sidebar">
                        <chat-list></chat-list>
                        <nav class="app-nav desktop-nav">
                            <router-link to="/home" class="nav-link">
                                <message-circle :size="20"></message-circle>
                                <span>Chats</span>
                            </router-link>
                            <router-link to="/profile" class="nav-link">
                                <user :size="20"></user>
                                <span>Profile</span>
                            </router-link>
                            <router-link to="/settings" class="nav-link">
                                <settings-icon :size="20"></settings-icon>
                                <span>Settings</span>
                            </router-link>
                        </nav>
                    </aside>
                    <div class="app-main">
                        <router-view v-if="!(isDesktop && $route.name === 'home')"></router-view>
                        <div v-else class="desktop-welcome">
                            <message-circle :size="56"></message-circle>
                            <h2>Welcome</h2>
                            <p>Select a chat from the sidebar to start messaging, or create a new one.</p>
                        </div>
                        <nav v-if="!isDesktop && $route.name !== 'chat' && $route.name !== 'page'" class="app-nav">
                            <router-link to="/home" class="nav-link">
                                <message-circle :size="24"></message-circle>
                                <span>Chats</span>
                            </router-link>
                            <router-link to="/profile" class="nav-link">
                                <user :size="24"></user>
                                <span>Profile</span>
                            </router-link>
                            <router-link to="/settings" class="nav-link">
                                <settings-icon :size="24"></settings-icon>
                                <span>Settings</span>
                            </router-link>
                        </nav>
                    </div>
                </template>
            </div>
        </template>
    </body>
</html>
